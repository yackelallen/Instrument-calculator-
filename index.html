<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<title>Yackel Instrument Toolkit v2.0.0</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#1f2937;color:white}
.header{background:#111827;padding:18px;text-align:center;border-bottom:3px solid #3b82f6}
.header h1{font-size:24px;margin:0 0 6px}
.section-title{border-top:1px solid #64748b;margin:16px 12px 8px;padding-top:12px;text-align:center;color:#93c5fd;font-weight:bold}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 12px}
.tile,.btn{background:#22c55e;color:#052e16;border:0;border-radius:12px;padding:14px;font-weight:bold;font-size:16px}
.btn.blue{background:#3b82f6;color:white}
.btn.red{background:#ef4444;color:white}
.page{display:none}
.card{background:#374151;border-radius:14px;margin:12px;padding:15px}
input,select,textarea{width:100%;box-sizing:border-box;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #94a3b8;font-size:16px}
textarea{min-height:100px}
label{font-weight:bold;color:#d1d5db}
.result{background:#111827;border-radius:10px;padding:12px;margin-top:8px;white-space:pre-wrap;color:#93c5fd}
table{width:100%;border-collapse:collapse;margin:10px 0;background:#111827}
th,td{border:1px solid #64748b;padding:8px;text-align:center;font-size:14px}
th{background:#0f172a}
.saved{background:#111827;border:1px solid #64748b;border-radius:10px;padding:10px;margin:8px 0}
.footer{text-align:center;color:#9ca3af;padding:18px}
.small{font-size:13px;color:#cbd5e1}

@media print {
  body * {
    visibility: hidden;
  }

  #printable-report,
  #printable-report * {
    visibility: visible;
  }

  #printable-report {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    background: white;
    color: black;
    padding: 20px;
  }

  button,
  input,
  textarea,
  select,
  .no-print {
    display: none !important;
  }
}

#splash{
 position:fixed;
 inset:0;
 background:#0f172a;
 z-index:9999;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 transition:opacity .8s ease, visibility .8s ease;
}
#splash.hide{
 opacity:0;
 visibility:hidden;
}
.splashBox{
 padding:24px;
 animation:splashFadeIn .8s ease forwards;
}
.splashLogo{
 width:150px;
 height:150px;
 border-radius:32px;
 box-shadow:0 0 35px rgba(59,130,246,.55);
 margin-bottom:18px;
}
.splashTitle{
 font-size:24px;
 font-weight:900;
 letter-spacing:1px;
 color:white;
 margin-bottom:10px;
}
.splashTagline{
 font-size:16px;
 color:#93c5fd;
 opacity:0;
 animation:taglineFade 1s ease forwards;
 animation-delay:.7s;
}
@keyframes splashFadeIn{
 from{opacity:0;transform:scale(.96)}
 to{opacity:1;transform:scale(1)}
}
@keyframes taglineFade{
 from{opacity:0;transform:translateY(8px)}
 to{opacity:1;transform:translateY(0)}
}


.reportCard{
 background:#0f172a;
 border:1px solid #334155;
 border-radius:16px;
 padding:18px;
 margin-top:14px;
}
.reportHeader{
 display:flex;
 justify-content:space-between;
 align-items:center;
 border-bottom:1px solid #334155;
 padding-bottom:10px;
 margin-bottom:12px;
}
.reportLogo{
 font-size:22px;
 font-weight:900;
 color:#60a5fa;
}
.reportTitle{
 font-size:18px;
 font-weight:700;
 color:white;
}
.reportGrid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 margin-bottom:12px;
}
.reportItem{
 background:#111827;
 border-radius:10px;
 padding:10px;
}
.reportLabel{
 font-size:12px;
 color:#94a3b8;
 margin-bottom:4px;
}
.reportValue{
 font-size:15px;
 font-weight:700;
 color:white;
}
.reportTable{
 width:100%;
 border-collapse:collapse;
 margin-top:10px;
}
.reportTable th{
 background:#1e293b;
 color:white;
 padding:10px;
 border:1px solid #334155;
}
.reportTable td{
 padding:10px;
 border:1px solid #334155;
 background:#111827;
 color:white;
}
.passCell{
 background:#14532d !important;
}
.failCell{
 background:#7f1d1d !important;
}
.signatureRow{
 display:flex;
 justify-content:space-between;
 gap:20px;
 margin-top:30px;
}
.signatureBox{
 flex:1;
 border-top:1px solid #94a3b8;
 padding-top:8px;
 color:#cbd5e1;
 text-align:center;
}

</style>
</head>
<body>
    
<div id="splash">
  <div class="splashBox">
    <img src="icon-512.PNG" class="splashLogo" alt="YIT Logo">
    <div class="splashTitle">YACKEL INSTRUMENT TOOLKIT</div>
    <div class="splashTagline">Built by Instrument Techs for Instrument Techs</div>
  </div>
</div>

<div class="header">
<h1>⚙️ YACKEL INSTRUMENT TOOLKIT</h1>
<div>Version 2.2.1-fixed</div>
<div>Built by Instrument Techs for Instrument Techs</div>
</div>

<div id="home">
<div class="section-title">CALCULATOR TOOLS</div>
<div class="grid">
<button class="tile" onclick="showPage('rtd')">🌡️ RTD</button>
<button class="tile" onclick="showPage('tc')">🔥 Thermocouple</button>
<button class="tile" onclick="showPage('ma')">📶 4-20 mA</button>
<button class="tile" onclick="showPage('toolbox')">⚡ Toolbox</button>
</div>

<div class="section-title">CALIBRATION & DOCUMENTATION</div>
<div class="grid">
<button class="tile" onclick="showPage('report')">📄 Reports</button>
<button class="tile" onclick="showPage('valve')">🛠️ Valve Stroke</button>
</div>

<div class="section-title">REFERENCE LIBRARY</div>
<div class="grid">
<button class="tile" onclick="showPage('library')">📚 TC Reference</button>
<button class="tile" onclick="showPage('quick')">📋 Quick Tables</button>
</div>
</div>   
           
<div id="report" class="page">
<div class="card">
 <button class="btn blue" onclick="home()">← Home</button>
<h2>Calibration Report</h2>
<textarea id="notes" placeholder="Calibration notes / problems found"></textarea>
        <button class="btn" onclick="generateReport()">Generate Report</button>
 <div id="printable-report"> <!-- Where professional only gets printable safely -->
  <button class="btn blue" onclick="generatePrintableReport();">Print / Save PDF </button>
  <br>
</div>
</div>
