<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yackel Instrument Toolkit v1.8</title>
<style>
body{margin:0;font-family:Arial;background:#1f2937;color:#fff}
.header{background:#111827;padding:20px;text-align:center;border-bottom:3px solid #3b82f6}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:15px}
.tile{background:#374151;padding:20px;border-radius:12px;text-align:center;cursor:pointer}
.section{display:none;padding:15px}
.active{display:block}
input,select,textarea,button{width:100%;padding:10px;margin:5px 0;border-radius:8px}
.card{background:#374151;padding:15px;border-radius:12px}
.result{background:#111827;padding:10px;border-radius:8px;margin-top:10px;white-space:pre-wrap}
.footer{text-align:center;padding:20px;color:#9ca3af}
</style></head>
<body>
<div class="header">
<h2>⚙️ YACKEL INSTRUMENT TOOLKIT</h2>
<div>Version 1.8 • Built by Instrument Techs for Instrument Techs</div>
</div>

<div id="home" class="active">
<div class="grid">
<div class="tile" onclick="show('rtd')">🌡️ RTD</div>
<div class="tile" onclick="show('tc')">🔥 TC</div>
<div class="tile" onclick="show('ma')">📶 4-20 mA</div>
<div class="tile" onclick="show('cal')">📋 Calibrator</div>
<div class="tile" onclick="show('report')">📄 Reports</div>
<div class="tile" onclick="show('toolbox')">⚡ Toolbox</div>
</div>
</div>

<div id="rtd" class="section"><div class="card">
<button onclick="home()">← Home</button>
<h3>RTD Temp → Resistance</h3>
<input id="rtdTemp" value="100">
<select id="rtdUnit"><option>C</option><option>F</option></select>
<select id="rtdType"><option value="100">Pt100</option><option value="1000">Pt1000</option></select>
<button onclick="calcRTD()">Calculate</button>
<div id="rtdOut" class="result"></div>
</div></div>

<div id="tc" class="section"><div class="card">
<button onclick="home()">← Home</button>
<h3>Thermocouple</h3>
<input id="tcTemp" value="212">
<select id="tcUnit"><option>F</option><option>C</option></select>
<select id="tcType"><option>K</option><option>J</option><option>T</option><option>E</option><option>N</option><option>R</option><option>S</option><option>B</option></select>
<button onclick="calcTC()">Calculate mV</button>
<div id="tcOut" class="result"></div>
</div></div>

<div id="ma" class="section"><div class="card">
<button onclick="home()">← Home</button>
<h3>4-20 mA Scaling</h3>
<input id="maIn" value="12"><input id="low" value="0"><input id="high" value="100">
<button onclick="calcMA()">Calculate</button>
<div id="maOut" class="result"></div>
</div></div>

<div id="cal" class="section"><div class="card">
<button onclick="home()">← Home</button>
<h3>Calibrator</h3>
<input id="pct" value="50">
<button onclick="calcPct()">Percent to mA</button>
<div id="pctOut" class="result"></div>
</div></div>

<div id="toolbox" class="section"><div class="card">
<button onclick="home()">← Home</button>
<h3>Toolbox</h3>
<input id="v" value="24"><input id="r" value="250">
<button onclick="ohms()">Ohm's Law</button>
<div id="ohmOut" class="result"></div>
</div></div>

<div id="report" class="section"><div class="card">
<button onclick="home()">← Home</button>
<h3>Calibration Report Generator</h3>
<input id="tag" placeholder="Tag Number">
<input id="tech" placeholder="Technician">
<input id="lrv" value="0" placeholder="LRV">
<input id="urv" value="100" placeholder="URV">
<textarea id="notes" placeholder="Notes"></textarea>
<button onclick="copyAF()">Copy As Found → As Left</button>
<button onclick="report()">Generate Report</button>
<div class="grid">
<input id="af0" placeholder="AF 0%">
<input id="af25" placeholder="AF 25%">
<input id="af50" placeholder="AF 50%">
<input id="af75" placeholder="AF 75%">
<input id="af100" placeholder="AF 100%">
<input id="al0" placeholder="AL 0%">
<input id="al25" placeholder="AL 25%">
<input id="al50" placeholder="AL 50%">
<input id="al75" placeholder="AL 75%">
<input id="al100" placeholder="AL 100%">
</div>
<div id="repOut" class="result"></div>
</div></div>

<div class="footer">Version 1.8</div>

<script>
function show(id){document.querySelectorAll('.section').forEach(x=>x.style.display='none');document.getElementById('home').style.display='none';document.getElementById(id).style.display='block'}
function home(){document.querySelectorAll('.section').forEach(x=>x.style.display='none');document.getElementById('home').style.display='block'}
function calcRTD(){let t=parseFloat(rtdTemp.value);if(rtdUnit.value=='F')t=(t-32)*5/9;let r0=parseFloat(rtdType.value);let r=r0*(1+0.0039083*t-0.0000005775*t*t);rtdOut.innerText='Resistance: '+r.toFixed(3)+' Ω'}
function calcTC(){let t=parseFloat(tcTemp.value);if(tcUnit.value=='F')t=(t-32)*5/9;let mv=t*0.041;tcOut.innerText='Approx mV: '+mv.toFixed(3)}
function calcMA(){let m=parseFloat(maIn.value),l=parseFloat(low.value),h=parseFloat(high.value);let eu=l+((m-4)/16)*(h-l);maOut.innerText='EU = '+eu.toFixed(3)}
function calcPct(){let p=parseFloat(pct.value);pctOut.innerText=((p/100)*16+4).toFixed(3)+' mA'}
function ohms(){let a=parseFloat(v.value)/parseFloat(r.value);ohmOut.innerText=a.toFixed(4)+' A\n'+(a*1000).toFixed(2)+' mA'}
function copyAF(){['0','25','50','75','100'].forEach(p=>document.getElementById('al'+p).value=document.getElementById('af'+p).value)}
function report(){repOut.innerText='Tag: '+tag.value+'\nTech: '+tech.value+'\nRange: '+lrv.value+'-'+urv.value+'\nNotes: '+notes.value}
</script>
</body></html>
